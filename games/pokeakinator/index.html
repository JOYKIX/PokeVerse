<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeAkinator — PokeVerse</title>
  <meta name="description" content="PokeAkinator." />
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="../../js/themes.js" defer></script>
  <script src="../../js/playerProgress.js" defer></script>
  <script src="../../js/pokeapi.js" defer></script>
  <script src="pokeakinator.js" defer></script>
</head>
<body data-page="pokeakinator">
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <header class="site-header" data-site-header>
    <a class="brand" href="../../index.html" aria-label="PokeVerse">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>PokeVerse</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
      <span></span><span></span><span></span>
      <span class="sr-only">Ouvrir le menu</span>
    </button>
    <nav class="primary-nav" id="primary-nav" aria-label="Navigation principale">
      <a href="../../index.html" data-nav-link>Accueil</a>
      <a href="../../index.html#games" data-nav-link>Jeux</a>
      <a href="../../pokedex/" data-nav-link>Pokédex</a>
      <a href="../../profile.html" data-nav-link>Profil</a>
    </nav>
  </header>

  <main id="main-content" class="pokeakinator-page">
    <section class="section-band" aria-labelledby="pokeakinator-title">
      <h1 id="pokeakinator-title">PokeAkinator</h1>
      <div class="pokeakinator-start" data-pokeakinator-start-panel>
        <button class="btn btn-primary" type="button" data-pokeakinator-start>Commencer</button>
        <p class="pokedle-error" data-pokeakinator-error></p>
      </div>

      <div class="pokeakinator-game" data-pokeakinator-game hidden>
        <div class="pokeakinator-board">
          <div class="pokeakinator-sprite"><img alt="Mega Alakazam" data-pokeakinator-sprite /></div>
          <div class="pokeakinator-dialog">
            <p data-pokeakinator-count></p>
            <h2 data-pokeakinator-question></h2>
            <div class="pokeakinator-actions">
              <button class="btn btn-primary" type="button" data-pokeakinator-answer="yes">Oui</button>
              <button class="btn btn-ghost" type="button" data-pokeakinator-answer="no">Non</button>
              <button class="btn btn-ghost" type="button" data-pokeakinator-answer="unknown">Je ne sais pas</button>
            </div>
          </div>
        </div>
      </div>

      <div class="pokedle-win" data-pokeakinator-result hidden>
        <h2 data-pokeakinator-result-title></h2>
        <p><span data-pokeakinator-guess></span></p>
        <div class="pokeakinator-actions">
          <button class="btn btn-primary" type="button" data-pokeakinator-correct>Oui</button>
          <button class="btn btn-ghost" type="button" data-pokeakinator-wrong>Non</button>
          <button class="btn btn-ghost" type="button" data-pokeakinator-new>Nouvelle partie</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 PokeVerse</p>
    <a href="../../index.html">Accueil</a>
  </footer>
</body>
</html>
