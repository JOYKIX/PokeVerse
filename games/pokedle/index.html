<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokedle — PokeVerse</title>
  <meta name="description" content="Pokedle." />
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="pokedle.js" defer></script>
</head>
<body data-page="pokedle">
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <header class="site-header" data-site-header>
    <a class="brand" href="../../index.html" aria-label="PokeVerse">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>PokeVerse</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
      <span></span><span></span><span></span>
      <span class="sr-only">Ouvrir le menu</span>
    </button>
    <nav class="primary-nav" id="primary-nav" aria-label="Navigation principale">
      <a href="../../index.html" data-nav-link>Accueil</a>
      <a href="../../index.html#games" data-nav-link>Jeux</a>
      <a href="../../index.html#leaderboard" data-nav-link>Classement</a>
    </nav>
  </header>

  <main id="main-content" class="pokedle-page">
    <section class="pokedle-hero section-band" aria-labelledby="pokedle-title">
      <h1 id="pokedle-title">Pokedle</h1>
      <div class="pokedle-start" data-pokedle-start-panel>
        <fieldset class="pokedle-generations" data-pokedle-generations>
          <legend>Sélection des générations</legend>
        </fieldset>
        <p class="pokedle-exp" data-pokedle-exp></p>
        <button class="btn btn-primary" type="button" data-pokedle-start>Commencer la partie</button>
        <p class="pokedle-error" data-pokedle-error></p>
      </div>
      <form class="pokedle-form" data-pokedle-form autocomplete="off">
        <label class="sr-only" for="pokedle-search">Pokémon</label>
        <input id="pokedle-search" class="pokedle-input" type="search" list="pokedle-list" placeholder="Pokémon" data-pokedle-input disabled />
        <datalist id="pokedle-list" data-pokedle-list></datalist>
        <button class="btn btn-primary" type="submit" data-pokedle-submit disabled>Valider</button>
      </form>
      <p class="pokedle-status" data-pokedle-status>Chargement</p>
      <div class="pokedle-win" data-pokedle-win hidden>
        <h2>Victoire</h2>
        <p><span data-pokedle-attempt-count></span></p>
        <p><span data-pokedle-found></span></p>
        <p><span data-pokedle-exp-gain></span></p>
        <button class="btn btn-primary" type="button" data-pokedle-new>Nouvelle partie</button>
      </div>
    </section>

    <section class="pokedle-table-section section-block" aria-labelledby="attempts-title">
      <h2 id="attempts-title">Tentatives</h2>
      <div class="pokedle-table-wrap">
        <table class="pokedle-table">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Type principal</th>
              <th>Type secondaire</th>
              <th>Taille</th>
              <th>Poids</th>
              <th>Génération</th>
            </tr>
          </thead>
          <tbody data-pokedle-attempts></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 PokeVerse</p>
    <a href="../../index.html">Accueil</a>
  </footer>
</body>
</html>
