<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeVerse</title>
  <meta name="description" content="Hub de jeux Pokémon." />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" defer></script>
</head>
<body data-page="home">
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <header class="site-header" data-site-header>
    <a class="brand" href="index.html" aria-label="PokeVerse">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>PokeVerse</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
      <span></span><span></span><span></span>
      <span class="sr-only">Ouvrir le menu</span>
    </button>
    <nav class="primary-nav" id="primary-nav" aria-label="Navigation principale">
      <a href="index.html" data-nav-link>Accueil</a>
      <a href="#games" data-nav-link>Jeux</a>
      <a href="#leaderboard" data-nav-link>Classement</a>
    </nav>
  </header>

  <main id="main-content">
    <section class="hero section-band">
      <div class="hero-copy">
        <h1>PokeVerse</h1>
        <div class="hero-actions">
          <a class="btn btn-primary" href="#games">Jeux</a>
          <a class="btn btn-ghost" href="games/pokedle/index.html">Pokedle</a>
        </div>
      </div>
      <div class="hero-panel" aria-label="PokeVerse">
        <div class="pokeball-emblem" aria-hidden="true"></div>
      </div>
    </section>

    <section class="section-block" id="games" aria-labelledby="games-title">
      <div class="section-heading row-heading">
        <h2 id="games-title">Jeux</h2>
        <div class="carousel-controls" aria-label="Contrôles du carrousel">
          <button class="square-btn" type="button" data-carousel-prev aria-label="Jeu précédent">‹</button>
          <button class="square-btn" type="button" data-carousel-next aria-label="Jeu suivant">›</button>
        </div>
      </div>
      <div class="carousel-shell">
        <div class="game-carousel" data-game-carousel tabindex="0" aria-label="Jeux"></div>
      </div>
    </section>

    <section class="section-block" id="all-games" aria-labelledby="all-games-title">
      <div class="section-heading">
        <h2 id="all-games-title">Tous les jeux</h2>
      </div>
      <div class="games-grid" data-games-grid></div>
    </section>

    <section class="info-strip" id="leaderboard" aria-labelledby="leaderboard-title">
      <h2 id="leaderboard-title">Classement</h2>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 PokeVerse</p>
    <a href="#main-content">Haut</a>
  </footer>
</body>
</html>
